<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>手机端｜2026 MT Debate</title><link rel="stylesheet" href="../styles.css"></head><body><main class="mobile page"><section class="card"><h1>加入观点阵营</h1><p class="hint" id="mobileStage">请先输入昵称，选择你的持方。正式辩论开始后，可以为你的阵营贡献观点。</p><div class="myBadge" id="badge" style="display:none"><div class="avatar" id="myEmoji">✨</div><div><b id="myName">我</b><div class="small" id="mySide">未选择</div></div></div><div id="joinBox"><div class="field"><label class="label">你的昵称</label><input class="input" id="nickname" maxlength="12" placeholder="例如：Phoebe"></div><div class="field"><label class="label">选择你的持方</label><div class="choiceGrid"><div class="choice" data-side="A"><strong id="choiceA">A</strong><span class="hint">选择后会显示在大屏阵营中</span></div><div class="choice" data-side="B"><strong id="choiceB">B</strong><span class="hint">选择后会显示在大屏阵营中</span></div></div></div><button class="btn" id="joinBtn">加入阵营</button></div><div id="commentBox" style="display:none"><div class="field"><label class="label">为你的阵营贡献一句观点</label><textarea class="textarea" id="comment" maxlength="50" placeholder="请用一句话说明你的理由，建议不超过50字"></textarea></div><button class="btn" id="sendBtn">提交观点，等待上墙</button><p class="hint">观点提交后会进入后台审核，通过后显示在大屏。</p></div><p class="toast" id="toast"></p></section></main><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script><script src="../config.js"></script><script src="../app.js"></script><script src="./mobile.js"></script></body></html>
