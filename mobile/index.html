<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>观众端｜MT Debate</title><link rel="stylesheet" href="../styles.css"></head><body><div class="grain"></div><div class="topnav"><a href="../screen/">大屏端</a><a class="active" href="../mobile/">观众端</a><a href="../admin/">后台端</a></div><main class="mobile"><div class="phone"><div class="brand" style="position:static;font-size:14px;transform:none;margin-top:0"><span class="line" style="width:90px"></span><span id="eventName">2025 MT Graduation</span></div><h2 id="mobileTitle">选择你的持方</h2><p id="mobileStage">请先输入昵称，选择你的持方。</p><div class="me" id="badge" style="display:none"><div class="avatar" id="myEmoji">✨</div><div><b id="myName">Guest</b><br><span style="color:rgba(255,247,220,.7)" id="mySide">当前持方</span></div></div><div id="joinBox"><div class="field"><label>昵称</label><input id="nickname" class="input" maxlength="12" placeholder="请输入你的昵称"></div><div class="choice-row"><div class="choice" data-side="A"><b id="choiceA">A</b><span>我支持这一方</span></div><div class="choice" data-side="B"><b id="choiceB">B</b><span>我支持这一方</span></div></div><button class="primary" id="joinBtn">加入阵营</button></div><div id="commentBox" style="display:none"><div class="field"><label>你的观点</label><textarea id="comment" maxlength="50" placeholder="请输入一句有启发的观点，最多50字"></textarea></div><button class="primary" id="sendBtn">提交观点，等待上墙</button><div class="btnrow"><button class="secondary" id="resetBtn">重新选择身份</button></div></div><p class="inline-toast" id="toast"></p><section class="public-feed"><div class="feed-head"><h3>已公开观点</h3><div class="feed-tabs"><button class="active" data-feed-filter="all">全部</button><button data-feed-filter="A">A方</button><button data-feed-filter="B">B方</button></div></div><div id="publicOpinionsList" class="public-opinions"><p class="empty-note">暂无已公开观点。</p></div></section></div></main><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script><script src="../config.js"></script><script src="../app.js"></script><script src="./mobile.js"></script></body></html>
