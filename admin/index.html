<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>后台端｜2026 MT Debate</title><link rel="stylesheet" href="../styles.css"></head><body><main class="admin page"><h1>后台控制台</h1><p class="hint">正式版使用 Firebase Authentication + Database Rules。请用你在 Firebase 创建的管理员邮箱登录。</p><section class="adminGrid"><div class="panel"><h2>管理员登录</h2><div id="loginBox"><div class="field"><label class="label">管理员邮箱</label><input class="input" id="email" placeholder="admin@example.com"></div><div class="field"><label class="label">管理员密码</label><input class="input" id="password" type="password" placeholder="Firebase Auth 密码"></div><button class="btn" id="loginBtn">登录后台</button><p class="small">你之前给的 2026MT 不再作为正式后台密码使用；正式版请使用 Firebase Authentication 账号，安全性更高。</p></div><div id="adminBox" style="display:none"><p>已登录：<b id="adminEmail"></b></p><button class="btn secondary" id="logoutBtn">退出</button><hr style="border-color:rgba(255,255,255,.14)"><h2>活动控制</h2><div class="field"><label class="label">当前辩题</label><select id="questionSelect"></select></div><div class="tabs" id="stageTabs"><button class="tab" data-stage="join">阵营选择</button><button class="tab" data-stage="debate">观点提交</button><button class="tab" data-stage="paused">暂停互动</button><button class="tab" data-stage="result">结果展示</button></div><br><div class="row"><button class="btn" id="initBtn">初始化/修复活动数据</button><button class="btn secondary" id="resetCurrentBtn">清空当前题数据</button></div><p class="toast" id="toast"></p></div></div><div class="panel"><h2>当前题目</h2><div class="row"><span class="pill" id="stageNow">-</span><span class="pill" id="countNow">0人加入</span></div><h3 id="qTitle">-</h3><p><b>A：</b><span id="qA">-</span></p><p><b>B：</b><span id="qB">-</span></p><h2>待审核观点</h2><div id="pendingList"><p class="hint">暂无待审核观点</p></div><h2>已通过观点</h2><div id="approvedList"><p class="hint">暂无已通过观点</p></div></div></section></main><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script><script src="../config.js"></script><script src="../app.js"></script><script src="./admin.js"></script></body></html>
