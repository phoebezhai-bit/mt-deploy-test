<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>后台端｜MT Debate</title><link rel="stylesheet" href="../styles.css"></head><body><div class="grain"></div><div class="topnav"><a href="../screen/">大屏端</a><a href="../mobile/">观众端</a><a class="active" href="../admin/">后台端</a></div><main class="admin"><section id="loginBox" class="panel login-panel"><h3>后台登录</h3><div class="field"><label>管理员邮箱</label><input class="input" id="email" placeholder="Email"></div><div class="field"><label>密码</label><input class="input" type="password" id="password" placeholder="Password"></div><button class="primary" id="loginBtn">登录后台</button><p class="inline-toast" id="loginHint"></p></section><section id="adminBox" style="display:none"><div class="admin-grid"><div class="panel"><h3>后台控制</h3><div class="formgrid"><div class="full field"><label>当前题目</label><select class="input" id="questionSelect"></select></div><div class="full field"><label>辩题</label><input class="input" id="qTitle" placeholder="请输入辩题"></div><div class="field"><label>A持方名称</label><input class="input" id="qA" placeholder="A持方名称"></div><div class="field"><label>B持方名称</label><input class="input" id="qB" placeholder="B持方名称"></div></div><div class="btnrow" id="stageTabs"><button class="secondary tab" data-stage="join">阵营选择阶段</button><button class="secondary tab" data-stage="debate">观点滚动阶段</button><button class="secondary tab" data-stage="paused">暂停互动</button><button class="secondary tab" data-stage="result">结果展示阶段</button></div><div class="btnrow"><button class="primary" id="saveQuestionBtn">保存题目文字</button><button class="secondary" id="initBtn">初始化/修复活动数据</button><button class="secondary danger" id="resetCurrentBtn">清空本题数据</button><button class="secondary" id="logoutBtn">退出登录</button></div><div style="margin-top:20px"><span class="pill">当前阶段：<b id="stageNow">-</b></span><span class="pill" id="countNow">0人加入</span><span class="pill">管理员：<b id="adminEmail">-</b></span></div><p class="inline-toast" id="toast"></p></div><div class="panel"><h3>观点审核</h3><div class="pending-list" id="pendingList"></div><h3 style="margin-top:24px">已上墙观点</h3><div class="pending-list" id="approvedList"></div></div></div></section></main><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script><script src="../config.js"></script><script src="../app.js"></script><script src="./admin.js"></script></body></html>
